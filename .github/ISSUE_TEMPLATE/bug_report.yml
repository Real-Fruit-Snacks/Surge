name: Bug Report
description: Report a bug in Surge
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: browser
    attributes:
      label: Browser / Platform
      description: "Browser name and version, operating system"
      placeholder: "Chrome 124 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Open Surge in browser
        2. Search for a command
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant browser console errors or screenshots"
      render: shell
    validations:
      required: false
