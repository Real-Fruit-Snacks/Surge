<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="arc-grad-lt" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Source point -->
  <circle cx="50" cy="100" r="4" fill="#7c3aed"/>

  <!-- Arc 1 — nearest, strongest -->
  <path d="M 70,60 A 50,50 0 0,1 70,140" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Arc 2 — middle -->
  <path d="M 95,40 A 75,75 0 0,1 95,160" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Arc 3 — farthest, faintest -->
  <path d="M 120,22 A 100,100 0 0,1 120,178" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Result dots scattered in the wave expansion zone -->
  <circle cx="135" cy="70" r="1.5" fill="#ec4899" opacity="0.9"/>
  <circle cx="150" cy="95" r="1.5" fill="#ec4899" opacity="0.7"/>
  <circle cx="142" cy="120" r="1.5" fill="#ec4899" opacity="0.8"/>
  <circle cx="160" cy="80" r="1.5" fill="#ec4899" opacity="0.6"/>
  <circle cx="155" cy="110" r="1.5" fill="#ec4899" opacity="0.5"/>
  <circle cx="165" cy="100" r="1.5" fill="#ec4899" opacity="0.4"/>
  <circle cx="148" cy="55" r="1.5" fill="#ec4899" opacity="0.5"/>
  <circle cx="158" cy="135" r="1.5" fill="#ec4899" opacity="0.45"/>
</svg>
