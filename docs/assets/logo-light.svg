<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: violet to pink -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Accent gradient: pink to violet -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#7c3aed" opacity="0.04"/>

    <!-- Source point — origin of the wave expansion -->
    <circle cx="38" cy="70" r="4.5" fill="url(#g3)" opacity="0.9"/>
    <circle cx="38" cy="70" r="2" fill="#ffffff"/>

    <!-- Arc 1 — nearest, strongest wave front -->
    <path d="M 58,42 A 35,35 0 0,1 58,98"
          fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Arc 2 — middle wave front -->
    <path d="M 78,30 A 50,50 0 0,1 78,110"
          fill="none" stroke="url(#g1)" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

    <!-- Arc 3 — farthest, faintest wave front -->
    <path d="M 98,22 A 62,62 0 0,1 98,118"
          fill="none" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round" opacity="0.25"/>

    <!-- Result dots — scattered in the wave expansion zone -->
    <circle cx="108" cy="45" r="1.8" fill="#ec4899" opacity="0.7"/>
    <circle cx="118" cy="62" r="1.5" fill="#ec4899" opacity="0.55"/>
    <circle cx="112" cy="80" r="1.8" fill="#ec4899" opacity="0.6"/>
    <circle cx="125" cy="52" r="1.3" fill="#a855f7" opacity="0.5"/>
    <circle cx="122" cy="90" r="1.3" fill="#a855f7" opacity="0.45"/>
    <circle cx="130" cy="70" r="1.5" fill="#7c3aed" opacity="0.35"/>

    <!-- Particle dots along wave arcs -->
    <circle cx="58" cy="42" r="1.5" fill="#7c3aed" opacity="0.45"/>
    <circle cx="58" cy="98" r="1.5" fill="#ec4899" opacity="0.45"/>
    <circle cx="78" cy="30" r="1.2" fill="#7c3aed" opacity="0.35"/>
    <circle cx="78" cy="110" r="1.2" fill="#ec4899" opacity="0.35"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#a855f7" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#ec4899" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "SURGE" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">SURGE</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">SEARCHABLE COMMAND REFERENCE</text>

  <!-- Version / descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">JS · OFFLINE · FUZZY SEARCH · CATPPUCCIN</text>
</svg>
