<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg-lt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    <linearGradient id="arc-grad-lt" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="title-grad-lt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accent-line-lt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7c3aed"/>
      <stop offset="80%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg-lt)"/>
  <rect width="800" height="280" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Expanding Wave Front logomark — left side -->
  <g transform="translate(100, 120)">
    <!-- Source point -->
    <circle cx="0" cy="0" r="4" fill="#7c3aed"/>

    <!-- Arc 1 -->
    <path d="M 22,-38 A 44,44 0 0,1 22,38" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Arc 2 -->
    <path d="M 42,-58 A 72,72 0 0,1 42,58" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

    <!-- Arc 3 -->
    <path d="M 62,-76 A 98,98 0 0,1 62,76" fill="none" stroke="url(#arc-grad-lt)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

    <!-- Result dots -->
    <circle cx="75" cy="-25" r="1.5" fill="#ec4899" opacity="0.9"/>
    <circle cx="85" cy="5" r="1.5" fill="#ec4899" opacity="0.7"/>
    <circle cx="80" cy="30" r="1.5" fill="#ec4899" opacity="0.8"/>
    <circle cx="92" cy="-15" r="1.5" fill="#ec4899" opacity="0.6"/>
    <circle cx="90" cy="18" r="1.5" fill="#ec4899" opacity="0.5"/>
    <circle cx="98" cy="0" r="1.5" fill="#ec4899" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="450" y="112" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="76" font-weight="bold" fill="url(#title-grad-lt)" text-anchor="middle" letter-spacing="10">SURGE</text>

  <!-- Accent line -->
  <rect x="280" y="130" width="340" height="2" rx="1" fill="url(#accent-line-lt)"/>

  <!-- Subtitle -->
  <text x="450" y="162" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="13" fill="#6b7280" text-anchor="middle" letter-spacing="4">SEARCHABLE COMMAND REFERENCE</text>

  <!-- Tag line -->
  <text x="450" y="192" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="10" fill="#9ca3af" text-anchor="middle" letter-spacing="3">JS  ·  OFFLINE  ·  FUZZY SEARCH  ·  CATPPUCCIN</text>

  <!-- Feature pills -->
  <g transform="translate(212, 210)">
    <rect x="0" y="0" width="110" height="26" rx="13" fill="#f3f4f6"/>
    <rect x="0" y="0" width="110" height="26" rx="13" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    <circle cx="16" cy="13" r="3.5" fill="#7c3aed"/>
    <text x="26" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="10" fill="#374151">fuzzy search</text>

    <rect x="124" y="0" width="100" height="26" rx="13" fill="#f3f4f6"/>
    <rect x="124" y="0" width="100" height="26" rx="13" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    <circle cx="140" cy="13" r="3.5" fill="#ec4899"/>
    <text x="150" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="10" fill="#374151">variables</text>

    <rect x="238" y="0" width="80" height="26" rx="13" fill="#f3f4f6"/>
    <rect x="238" y="0" width="80" height="26" rx="13" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    <circle cx="254" cy="13" r="3.5" fill="#7c3aed"/>
    <text x="264" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="10" fill="#374151">offline</text>

    <rect x="332" y="0" width="130" height="26" rx="13" fill="#f3f4f6"/>
    <rect x="332" y="0" width="130" height="26" rx="13" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    <circle cx="348" cy="13" r="3.5" fill="#ec4899"/>
    <text x="358" y="17" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace" font-size="10" fill="#374151">catppuccin</text>
  </g>
</svg>
